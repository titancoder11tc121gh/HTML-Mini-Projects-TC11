<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Prism | Kinetic Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clock-container">
        <div class="ring sec-ring" id="sec-ring"></div>
        <div class="ring min-ring" id="min-ring"></div>
        <div class="ring hr-ring" id="hr-ring"></div>

        <div class="clock-face">
            <div class="digital-time">
                <span id="hours">00</span>
                <span class="dots">:</span>
                <span id="minutes">00</span>
                <div class="seconds-box">
                    <span id="seconds">00</span>
                </div>
            </div>
            <div class="date" id="date-display">MONDAY, JAN 01</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
