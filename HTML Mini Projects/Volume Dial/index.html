<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Mixer Dial V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dj-deck">
        <div class="dial-container">
            <div class="led-ring" id="led-ring"></div>
            
            <div class="core-glow" id="core-glow"></div>
            
            <div class="dial" id="dial">
                <div class="dial-indicator" id="indicator"></div>
            </div>
            
            <div class="digital-display">
                <span id="vol-text">0</span><span class="percent">%</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
