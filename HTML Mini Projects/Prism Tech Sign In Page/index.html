<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Prism Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container" id="container">
        <div class="circle-decor circle-1"></div>
        <div class="circle-decor circle-2"></div>

        <div class="card" id="card">
            <div class="form-box">
                <h2 id="form-title">Welcome Back</h2>
                
                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" required>
                        <label>Username / Email</label>
                        <div class="bar"></div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" required>
                        <label>Password</label>
                        <div class="bar"></div>
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>

                    <div id="feedback-msg"></div>

                    <button type="submit" class="btn-grad" id="main-btn">Sign In</button>

                    <div class="links">
                        <a href="#">Forgot Password?</a>
                        <a href="#">Need Help?</a>
                    </div>
                </form>

                <div class="toggle-text">
                    Don't have an account? <span id="toggle-btn">Sign Up</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
